<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Directory</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:url("Background.png") no-repeat center center fixed;
    background-size:cover;
    text-align:center;
    padding:20px;
}

/* Staff images */
.staff-img{
    width:90%;
    max-width:900px;
    margin:15px auto;
    display:block;
    border-radius:12px;
}

/* Back button */
.back-btn{
    margin-top:20px;
    padding:18px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:#0057d8;
    color:white;
    width:90%;
    max-width:500px;
    cursor:pointer;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.back-btn:active{
    transform:scale(0.97);
}
</style>
</head>

<body>

<img src="1_FACI.jpg" class="staff-img">
<img src="2_FACI.jpg" class="staff-img">
<img src="3_FACI.jpg" class="staff-img">
<img src="4_FACI.jpg" class="staff-img">
<img src="5_FACI.jpg" class="staff-img">
<img src="6_FACI.jpg" class="staff-img">
<img src="7_FACI.jpg" class="staff-img">

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<script>
function goBack(){
    window.location.href = "map.html";
}
</script>

</body>
</html>
