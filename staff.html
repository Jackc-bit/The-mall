<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Directory</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("Background.png") no-repeat center center fixed;
    background-size:cover;
    text-align:center;
    padding:20px;
}

h1{
    color:white;
    margin-top:20px;
}

.staff-box{
    background:white;
    padding:20px;
    margin:15px auto;
    max-width:500px;
    border-radius:12px;
    font-size:22px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.back-btn{
    margin-top:20px;
    padding:18px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:#0057d8;
    color:white;
    width:90%;
    max-width:500px;
}
</style>
</head>

<body>

<h1>Staff Directory</h1>

<div class="staff-box">Principal</div>
<div class="staff-box">Registrar</div>
<div class="staff-box">Guidance Office</div>
<div class="staff-box">Finance Office</div>

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<script>
function goBack(){
    window.history.back();
}
</script>

</body>
</html>
