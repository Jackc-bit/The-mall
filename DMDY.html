<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMDY</title>

<style>

body{
    margin:0;
    font-family:Arial;
    text-align:center;
    padding:20px;

    /* Same background */
    background:url("Background.png") no-repeat center center fixed;
    background-size:cover;
}

h1{
    margin-top:20px;
    color:white;
}

img.map{
    width:100%;
    max-width:900px;
    border-radius:12px;
    box-shadow:0 0 12px rgba(0,0,0,0.3);
    margin-top:20px;
}

/* PRIME LAB image button */

.prime-btn img{
    width:90%;
    max-width:500px;
    margin-top:25px;
    cursor:pointer;
    transition:transform 0.15s ease;
}

.prime-btn img:hover{
    transform:scale(1.05);
}

video{
    width:100%;
    max-width:900px;
    margin-top:20px;
    border-radius:12px;
    box-shadow:0 0 12px rgba(0,0,0,0.3);
    display:none;
}

.back-btn{
    display:inline-block;
    background:#0057d8;
    color:white;
    padding:15px 30px;
    margin-top:30px;
    font-size:20px;
    border-radius:10px;
    text-decoration:none;
}

</style>

<script>
function playLabVideo(){
    const video = document.getElementById("primeLabVideo");
    video.style.display = "block";
    video.play();
}
</script>

</head>

<body>

<h1>DMDY</h1>



<!-- PRIME LAB PNG BUTTON -->
<div class="prime-btn" onclick="playLabVideo()">
    <img src="PRIME_LAB.png" alt="Prime / Creatives Laboratory">
</div>

<!-- Video -->
<video id="primeLabVideo" controls>
    <source src="Prime_Lab.mov" type="video/mp4">
    Your browser does not support the video tag.
</video>

<!-- Back -->
<a href="map.html" class="back-btn">⬅ BACK</a>

</body>
</html>
