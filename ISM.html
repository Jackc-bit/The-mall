<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISM</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: url("Background.png") no-repeat center center fixed;
        background-size: cover;
        text-align: center;
        padding: 20px;
    }

    h1 {
        margin-top: 20px;
        color: white;
        text-shadow: 0 0 5px rgba(0,0,0,0.6);
    }

    .content-image {
        width: 100%;
        max-width: 900px;
        margin: 20px auto;
        border-radius: 12px;
        box-shadow: 0 0 12px rgba(0,0,0,0.4);
    }

    /* IMAGE BUTTON */
    .btn-img {
        width: 90%;
        max-width: 300px;
        margin: 20px auto;
        display: block;
        cursor: pointer;
        transition: transform 0.15s ease;
    }

    .btn-img:hover {
        transform: scale(1.05);
    }

    .btn {
        display: block;
        background: #0057d8;
        color: white;
        padding: 18px;
        margin: 20px auto;
        font-size: 20px;
        font-weight: bold;
        border-radius: 12px;
        text-decoration: none;
        width: 90%;
        max-width: 300px;
        box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }

    #videoContainer {
        display: none;
        margin-top: 20px;
    }

    video {
        width: 90%;
        max-width: 800px;
        border-radius: 12px;
        box-shadow: 0 6px 12px rgba(0,0,0,0.3);
    }
</style>
</head>

<body>

<h1>ISM</h1>



<!-- IMAGE BUTTON -->
<img src="SCIREBU.png" class="btn-img" onclick="showVideo()">

<!-- Video Container -->
<div id="videoContainer">
    <video controls autoplay>
        <source src="ISM_402_FMH.mov" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div>

<!-- Back Button -->
<a href="map.html" class="btn">⬅ BACK TO MAP</a>

<script>
function showVideo() {
    document.getElementById("videoContainer").style.display = "block";
}
</script>

</body>
</html>
