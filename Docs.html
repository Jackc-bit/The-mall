<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documents Processing</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("Background.png") no-repeat center center fixed;
    background-size:cover;
    text-align:center;
    padding:20px;
}

h1{
    color:white;
    margin-top:20px;
}

/* Document images */
.doc-img{
    width:90%;
    max-width:700px;
    margin:15px auto;
    display:block;
    border-radius:12px;
}

/* Back button */
.back-btn{
    margin-top:20px;
    padding:18px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:#0057d8;
    color:white;
    width:90%;
    max-width:500px;
    cursor:pointer;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.back-btn:active{
    transform:scale(0.97);
}
</style>
</head>

<body>

<h1>Documents Processing</h1>

<img src="2_DOC.jpg" class="doc-img">
<img src="3_DOC.jpg" class="doc-img">
