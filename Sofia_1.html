<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofia Building - 1st Floor</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        text-align: center;
        padding: 20px;

        background: url("Background.png") no-repeat center center fixed;
        background-size: cover;
    }

    h1 {
        margin-top: 20px;
        color: white;
        text-shadow: 0 0 6px rgba(0,0,0,0.7);
    }

    img.map-img {
        width: 100%;
        max-width: 800px;
        margin-top: 20px;
        border-radius: 10px;
        box-shadow: 0 0 8px rgba(0,0,0,0.2);
    }

    /* IMAGE BUTTON */
    .btn-img {
        width: 90%;
        max-width: 400px;
        margin: 20px auto;
        display: block;
        cursor: pointer;
        transition: transform 0.15s ease;
    }

    .btn-img:hover {
        transform: scale(1.05);
    }

    a {
        display: inline-block;
        background:#0057d8;
        color:white;
        padding: 15px 30px;
        margin-top: 30px;
        font-size: 18px;
        border-radius: 10px;
        text-decoration: none;
    }

    video {
        width: 100%;
        max-width: 800px;
        margin-top: 20px;
        border-radius: 10px;
        box-shadow: 0 0 8px rgba(0,0,0,0.2);
        display: none;
    }
</style>
</head>

<body>

<h1>Sofia Building - 1st Floor</h1>

<br>

<!-- IMAGE BUTTON -->
<img src="HIMIG_BU.png" class="btn-img" onclick="playVideo()">

<br>

<video id="himigVideo" controls>
    <source src="Himig_Dycian.mov" type="video/mp4">
    Your browser does not support the video tag.
</video>

<br>

<a href="sofia.html">⬅ Back</a>

<script>
function playVideo() {
    var video = document.getElementById("himigVideo");
    video.style.display = "block";
    video.play();
}
</script>

</body>
</html>
