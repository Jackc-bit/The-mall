<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHMT Building</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #f2f2f2;
        text-align: center;
        padding: 20px;
    }

    h1 {
        margin-top: 20px;
    }

    .btn {
        display: inline-block;
        background:#0057d8;
        color:white;
        padding: 15px 30px;
        margin: 15px;
        font-size: 20px;
        border-radius: 10px;
        text-decoration: none;
        cursor: pointer;
        border: none;
        box-shadow: 0 0 8px rgba(0,0,0,0.15);
    }

    video {
        width: 100%;
        max-width: 800px;
        margin-top: 20px;
        border-radius: 10px;
        box-shadow: 0 0 8px rgba(0,0,0,0.2);
        display: none;
    }
</style>
</head>

<body>

<h1>CHMT Building</h1>

<button class="btn" onclick="playRegistrar()">Registrar</button>

<br>

<video id="registrarVideo" controls>
    <source src="Registrar.mov" type="video/mp4">
    Your browser does not support the video tag.
</video>

<br>

<button class="btn" onclick="goBack()">⬅ Back</button>

<script>
function playRegistrar() {
    var video = document.getElementById("registrarVideo");
    video.style.display = "block";
    video.play();
}

function goBack() {
    window.history.back();
}
</script>

</body>
</html>
