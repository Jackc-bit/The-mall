<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAISE</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        text-align: center;
        padding: 20px;

        /* BACKGROUND */
        background: url("Background.png") no-repeat center center fixed;
        background-size: cover;
    }

    h1 {
        margin-top: 20px;
        color: white;
        text-shadow: 0 0 6px rgba(0,0,0,0.7);
    }

    img.map-img {
        width: 100%;
        max-width: 900px;
        border-radius: 12px;
        box-shadow: 0 0 12px rgba(0,0,0,0.4);
        margin-top: 20px;
    }

    /* IMAGE BUTTON */
    .btn-img {
        width: 90%;
        max-width: 350px;
        margin: 25px auto;
        display: block;
        cursor: pointer;
        transition: transform 0.15s ease;
    }

    .btn-img:hover {
        transform: scale(1.05);
    }

    video {
        width: 100%;
        max-width: 900px;
        margin-top: 20px;
        border-radius: 12px;
        box-shadow: 0 0 12px rgba(0,0,0,0.4);
        display: none;
    }

    .back-btn {
        display: inline-block;
        background: #0057d8;
        color: white;
        padding: 15px 30px;
        margin-top: 30px;
        font-size: 20px;
        border-radius: 10px;
        text-decoration: none;
    }
</style>

<script>
function playRaiseLabVideo() {
    const video = document.getElementById("raiseLabVideo");
    video.style.display = "block";
    video.play();
}
</script>
</head>

<body>

<h1>RAISE</h1>


<!-- IMAGE BUTTON -->
<img src="RAISE_BUT.png" class="btn-img" onclick="playRaiseLabVideo()">

<!-- Video Player -->
<video id="raiseLabVideo" controls>
    <source src="Raise_Lab.mov" type="video/mp4">
    Your browser does not support the video tag.
</video>

<a href="map.html" class="back-btn">⬅ BACK</a>

</body>
</html>
