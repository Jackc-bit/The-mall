<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCL</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #f2f2f2;
        text-align: center;
        padding: 20px;
    }

    h1 {
        margin-top: 20px;
    }

    /* IMAGE BUTTONS */
    .btn-img {
        width: 90%;
        max-width: 400px;
        margin: 15px auto;
        display: block;
        cursor: pointer;
        transition: transform 0.15s ease;
    }

    .btn-img:hover {
        transform: scale(1.05);
    }

    .nav-btn {
        display: inline-block;
        background: #0057d8;
        color: white;
        padding: 15px 30px;
        margin-top: 20px;
        font-size: 20px;
        border-radius: 10px;
        text-decoration: none;
        box-shadow: 0 0 8px rgba(0,0,0,0.15);
        cursor: pointer;
        border: none;
    }

    video {
        margin-top: 30px;
        max-width: 100%;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        display: none;
    }
</style>
</head>

<body>

<h1>MCL</h1>

<p>Content for MCL goes here.</p>

<!-- IMAGE BUTTONS -->
<img src="TANGHALANG_ISHMAELBU.png" class="btn-img" onclick="playVideo('ishmaelVideo')">

<img src="CASE_ROOMBU.png" class="btn-img" onclick="playVideo('caseRoomVideo')">

<a href="map.html" class="nav-btn">⬅ BACK</a>

<!-- VIDEOS -->
<video id="ishmaelVideo" controls>
    <source src="Tanghalang_Ismael.mov" type="video/mp4">
    Your browser does not support the video tag.
</video>

<video id="caseRoomVideo" controls>
    <source src="101_Caseroom.mov" type="video/mp4">
    Your browser does not support the video tag.
</video>

<script>
function playVideo(videoId) {
    const videos = document.querySelectorAll("video");

    videos.forEach(v => {
        v.pause();
        v.currentTime = 0;
        v.style.display = "none";
    });

    const video = document.getElementById(videoId);
    video.style.display = "block";
    video.play();
}
</script>

</body>
</html>
