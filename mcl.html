<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCL</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: url("Background.png") no-repeat center center fixed;
        background-size: cover;
        text-align: center;
        padding: 20px;
    }

    h1, p {
        color: white;
        text-shadow: 0 0 6px rgba(0,0,0,0.7);
    }

    h1 {
        margin-top: 20px;
    }

    .nav-btn {
        display: inline-block;
        background: rgba(0, 87, 216, 0.85);
        color: white;
        padding: 15px 30px;
        margin-top: 20px;
        font-size: 20px;
        border-radius: 10px;
        text-decoration: none;
        box-shadow: 0 0 10px rgba(0,0,0,0.3);
        backdrop-filter: blur(5px);
        cursor: pointer;
        border: none;
        transition: transform 0.15s ease, background 0.2s;
    }

    .nav-btn:hover {
        transform: scale(1.05);
        background: rgba(0, 87, 216, 1);
    }

    video {
        margin-top: 30px;
        max-width: 100%;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0,0,0,0.4);
        display: none;
        animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }
</style>
</head>

<body>

<h1>MCL</h1>

<p>Content for MCL goes here.</p>

<button class="nav-btn" onclick="playVideo('ishmaelVideo')">Tanghalang Ishmael</button><br>

<button class="nav-btn" onclick="playVideo('caseRoomVideo')">Case Room</button><br>

<button class="nav-btn" onclick="playVideo('feltaLabVideo')">Felta Lab</button><br>

<a href="map.html" class="nav-btn">⬅ BACK</a>

<video id="ishmaelVideo" controls>
    <source src="Tanghalang_Ismael.mov" type="video/mp4">
    Your browser does not support the video tag.
</video>

<video id="caseRoomVideo" controls>
    <source src="101_Caseroom.mov" type="video/mp4">
    Your browser does not support the video tag.
</video>

<video id="feltaLabVideo" controls>
    <source src="202_Felta_Lab.mov" type="video/mp4">
    Your browser does not support the video tag.
</video>

<script>
function playVideo(videoId) {
    const videos = document.querySelectorAll("video");

    videos.forEach(v => {
        v.pause();
        v.currentTime = 0;
        v.style.display = "none";
    });

    const video = document.getElementById(videoId);
    video.style.display = "block";
    video.play();
}
</script>

</body>
</html>
