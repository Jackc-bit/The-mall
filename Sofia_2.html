<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofia Building - 2nd Floor</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #f2f2f2;
        text-align: center;
        padding: 20px;
    }
    h1 {
        margin-top: 20px;
    }
    .btn {
        display: inline-block;
        background:#0057d8;
        color:white;
        padding: 15px 30px;
        margin-top: 20px;
        font-size: 18px;
        border-radius: 10px;
        text-decoration: none;
        cursor: pointer;
        border: none;
    }
    video {
        width: 100%;
        max-width: 800px;
        margin-top: 20px;
        border-radius: 10px;
        box-shadow: 0 0 8px rgba(0,0,0,0.2);
        display: none;
    }
</style>
</head>

<body>

<h1>Sofia Building - 2nd Floor</h1>

<button class="btn" onclick="playVideo()">Spark Lab</button>

<br>

<video id="sparkVideo" controls>
    <source src="SparkLab.mov" type="video/mp4">
    Your browser does not support the video tag.
</video>

<br>

<a href="sofia.html" class="btn">⬅ Back</a>

<script>
function playVideo() {
    var video = document.getElementById("sparkVideo");
    video.style.display = "block";
    video.play();
}
</script>

</body>
</html>
