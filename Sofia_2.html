<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofia Building - 2nd Floor</title>

<style>

body{
    margin:0;
    font-family:Arial;
    text-align:center;
    padding:20px;

    /* Background image */
    background:url("Background.png") no-repeat center center fixed;
    background-size:cover;
}

h1{
    margin-top:20px;
    color:white;
    text-shadow:0 0 6px rgba(0,0,0,0.7);
}

/* IMAGE BUTTONS */
.btn-img{
    width:90%;
    max-width:400px;
    margin:15px auto;
    display:block;
    cursor:pointer;
    transition:transform 0.15s ease;
}

.btn-img:hover{
    transform:scale(1.05);
}

.back-btn{
    display:inline-block;
    background:#0057d8;
    color:white;
    padding:15px 30px;
    margin-top:20px;
    font-size:18px;
    border-radius:10px;
    text-decoration:none;
}

video{
    width:100%;
    max-width:800px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 0 8px rgba(0,0,0,0.2);
    display:none;
}

</style>
</head>

<body>

<h1>Sofia Building - 2nd Floor</h1>

<!-- IMAGE BUTTONS -->
<img src="SPARK_BU.png" class="btn-img" onclick="playSpark()">
<img src="MISSIONS_BU.png" class="btn-img" onclick="playMissions()">

<br>

<video id="sparkVideo" controls>
<source src="SparkLab.mov" type="video/mp4">
Your browser does not support the video tag.
</video>

<video id="missionsVideo" controls>
<source src="MISSIONS_Office.mov" type="video/mp4">
Your browser does not support the video tag.
</video>

<br>

<a href="sofia.html" class="back-btn">⬅ Back</a>

<script>

function playSpark(){
    var spark=document.getElementById("sparkVideo");
    var missions=document.getElementById("missionsVideo");

    missions.pause();
    missions.currentTime = 0;
    missions.style.display="none";

    spark.style.display="block";
    spark.play();
}

function playMissions(){
    var spark=document.getElementById("sparkVideo");
    var missions=document.getElementById("missionsVideo");

    spark.pause();
    spark.currentTime = 0;
    spark.style.display="none";

    missions.style.display="block";
    missions.play();
}

</script>

</body>
</html>
