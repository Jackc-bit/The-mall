<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facilities and Faculties</title>

<style>

body{
    margin:0;
    font-family:Arial;
    text-align:center;
    padding:20px;

    /* Background */
    background:url("Background.png") no-repeat center center fixed;
    background-size:cover;
}

h1{
    margin-top:20px;
    color:white;
}

/* Image buttons */

.facility-btn img{
    width:90%;
    max-width:500px;
    margin:15px 0;
    cursor:pointer;
    transition:transform 0.15s ease;
}

.facility-btn img:hover{
    transform:scale(1.04);
}

video{
    width:100%;
    max-width:800px;
    margin:20px auto;
    display:none;
    border-radius:12px;
    box-shadow:0 0 12px rgba(0,0,0,0.4);
}

.back-btn{
    display:inline-block;
    background:#0057d8;
    color:white;
    padding:15px 30px;
    margin-top:30px;
    font-size:20px;
    border-radius:10px;
    text-decoration:none;
    box-shadow:0 0 8px rgba(0,0,0,0.15);
}

</style>

<script>
window.onload=function(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen().catch(err=>{});
    }
};

function playVideo(file){
    const video=document.getElementById("videoPlayer");
    video.src=file;
    video.style.display="block";
    video.play();
}
</script>

</head>

<body>

<h1>Facilities and Faculties</h1>

<!-- Sapienta -->
<div class="facility-btn" onclick="playVideo('Sapienta.mov')">
<img src="SAPIENTA_BU.png" alt="Sapienta">
</div>

<!-- Chapel -->
<div class="facility-btn" onclick="playVideo('Chapel.mov')">
<img src="CHAPEL_BU.png" alt="Chapel">
</div>

<!-- Bibliotheca -->
<div class="facility-btn" onclick="playVideo('Bibliotheca.mov')">
<img src="BIBLIOTHECA_BU.png" alt="Bibliotheca">
</div>

<!-- Clinic -->
<div class="facility-btn" onclick="playVideo('Clinic.mov')">
<img src="CLINIC_BU.png" alt="Clinic">
</div>

<!-- Video player -->
<video id="videoPlayer" controls></video>

<a href="map.html" class="back-btn">⬅ BACK</a>

</body>
</html>
